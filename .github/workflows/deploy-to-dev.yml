# Post AWS->DO migration: main builds/pushes to GHCR and deploys straight to
# do-prod (the only live cluster — EKS dev/prod are retired). Filename kept to
# preserve any required-status-check config; see the job below for the real target.
name: Build & Deploy API to Prod (GitOps)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container:
      image: node:24-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: |
          export $(cat env-example-relational | grep -v '^#' | xargs)
          npm run test:ci
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

  e2e-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Run in parallel with unit tests

    steps:
      - uses: actions/checkout@v4

      - name: Checkout atproto-devnet
        uses: actions/checkout@v4
        with:
          repository: OpenMeet-Team/atproto-devnet
          path: atproto-devnet
          ref: v0.1.0

      - name: Run e2e tests
        id: relational
        run: >-
          docker compose
          -f docker-compose.relational.ci.yaml
          -f atproto-devnet/docker-compose.yml
          -f docker-compose-ci-devnet.yml
          --env-file env-example-relational-ci
          -p ci-relational
          up --build --exit-code-from api

      - name: Copy prod.log from container to host
        if: ${{ failure() && steps.relational.conclusion == 'failure' }}
        run: docker cp ci-relational-api-1:/usr/src/app/prod.log .

      - name: Upload prod.log to artifacts for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-logs
          path: prod.log

  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # push to ghcr.io/openmeet-team/openmeet-api via GITHUB_TOKEN
    outputs:
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}

    steps:
      - name: Checkout API repository
        uses: actions/checkout@v4

      # Auth to GHCR. GITHUB_TOKEN works once the package is linked to this repo
      # (Package settings -> Manage Actions access -> add openmeet-api = Write).
      # To use a PAT instead: set password to ${{ secrets.GHCR_PAT }} and drop the
      # packages: write permission above.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: set-outputs
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image to GHCR
        env:
          IMAGE: ghcr.io/openmeet-team/openmeet-api
          GIT_REVISION: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Building $IMAGE:$IMAGE_TAG"
          PACKAGE_JSON_B64=$(base64 -w 0 < package.json)
          docker build \
            --build-arg GIT_REVISION="$GIT_REVISION" \
            --build-arg GIT_BRANCH="$GIT_BRANCH" \
            --build-arg PACKAGE_JSON_B64="$PACKAGE_JSON_B64" \
            -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

  gitops-update:
    needs: [build-and-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/update-image-gitops.yml
    with:
      service_name: api
      image_tag: ${{ needs.build-and-deploy.outputs.image_tag }}
      image_name: ghcr.io/openmeet-team/openmeet-api
      environment: do-prod
      commit_message: "GitOps: deploy api ${{ needs.build-and-deploy.outputs.image_tag }} to do-prod (main)"
    secrets:
      GH_PAT: ${{ secrets.GH_PAT_INFRASTRUCTURE }}
